<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Portfolio{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ── Design Tokens ─────────────────────────────────────────────────── */
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'SFMono-Regular', monospace;

      --space-1: 4px;   --space-2: 8px;   --space-3: 12px;  --space-4: 16px;
      --space-5: 20px;  --space-6: 24px;  --space-8: 32px;  --space-10: 40px;
      --space-12: 48px; --space-16: 64px; --space-20: 80px; --space-24: 96px;

      --text-xs: 0.75rem;  --text-sm: 0.875rem; --text-base: 1rem;
      --text-lg: 1.125rem; --text-xl: 1.25rem;  --text-2xl: 1.5rem;
      --text-3xl: 1.875rem;--text-4xl: 2.25rem; --text-5xl: 3rem; --text-6xl: 3.75rem;

      --weight-light: 300; --weight-normal: 400; --weight-medium: 500;
      --weight-semibold: 600; --weight-bold: 700;

      --leading-tight: 1.2; --leading-snug: 1.375;
      --leading-normal: 1.5; --leading-relaxed: 1.75;

      --radius-sm: 5px; --radius-md: 5px; --radius-lg: 5px;
      --radius-xl: 5px; --radius-2xl: 5px; --radius-full: 5px;

      --shadow-sm:  0 1px 2px rgba(0,0,0,0.05);
      --shadow-md:  0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-lg:  0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      --shadow-xl:  0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
      --shadow-premium: 0 0 0 1px rgba(255,255,255,0.05), 0 10px 30px -10px rgba(0,0,0,0.5);

      --transition-fast: 150ms cubic-bezier(0.4,0,0.2,1);
      --transition-base: 300ms cubic-bezier(0.4,0,0.2,1);
      --transition-slow: 500ms cubic-bezier(0.4,0,0.2,1);

      --color-bg:             #0F0F1A;
      --color-surface:        #181824;
      --color-surface-2:      #1E1E2E;
      --color-border:         #313341;
      --color-text-primary:   #E2E8F0;
      --color-text-secondary: #CBD5E1;
      --color-text-muted:     #94A3B8;
      --color-accent:         #818CF8;
      --color-accent-hover:   #A5B4FC;
      --color-accent-text:    #111820;
    }

    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-sans);
      background-color: var(--color-bg);
      color: var(--color-text-secondary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: var(--leading-normal);
    }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .container    { max-width: 1200px; margin: 0 auto; padding: 0 var(--space-6); width: 100%; }
    .container-sm { max-width: 800px;  margin: 0 auto; padding: 0 var(--space-6); width: 100%; }
    .section      { padding: var(--space-24) 0; }
    .section-sm   { padding: var(--space-16) 0; }
    .section-xs   { padding: var(--space-12) 0; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-8); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-6); }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-6); }
    .flex            { display: flex; }
    .flex-col        { flex-direction: column; }
    .items-center    { align-items: center; }
    .items-start     { align-items: flex-start; }
    .justify-center  { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .justify-end     { justify-content: flex-end; }
    .flex-wrap       { flex-wrap: wrap; }
    .gap-2  { gap: var(--space-2); }
    .gap-3  { gap: var(--space-3); }
    .gap-4  { gap: var(--space-4); }
    .gap-6  { gap: var(--space-6); }
    .gap-8  { gap: var(--space-8); }
    .gap-12 { gap: var(--space-12); }
    .text-center { text-align: center; }
    .text-left   { text-align: left; }
    .w-full  { width: 100%; }
    .h-full  { height: 100%; }
    .relative        { position: relative; }
    .overflow-hidden { overflow: hidden; }
    .mt-4  { margin-top: var(--space-4); }
    .mt-6  { margin-top: var(--space-6); }
    .mt-8  { margin-top: var(--space-8); }
    .mt-12 { margin-top: var(--space-12); }
    .mb-4  { margin-bottom: var(--space-4); }
    .mb-6  { margin-bottom: var(--space-6); }
    .mb-8  { margin-bottom: var(--space-8); }
    .mb-12 { margin-bottom: var(--space-12); }
    .mx-auto { margin-left: auto; margin-right: auto; }

    /* ── Typography ────────────────────────────────────────────────────── */
    .heading-1 {
      font-size: var(--text-6xl); font-weight: var(--weight-bold);
      line-height: var(--leading-tight); color: var(--color-text-primary);
      letter-spacing: -0.03em;
    }
    .heading-2 {
      font-size: var(--text-4xl); font-weight: var(--weight-bold);
      line-height: var(--leading-tight); color: var(--color-text-primary);
      letter-spacing: -0.02em;
    }
    .heading-3 {
      font-size: var(--text-2xl); font-weight: var(--weight-semibold);
      line-height: var(--leading-snug); color: var(--color-text-primary);
      letter-spacing: -0.01em;
    }
    .heading-4 {
      font-size: var(--text-xl); font-weight: var(--weight-semibold);
      color: var(--color-text-primary);
    }
    .heading-5 {
      font-size: var(--text-lg); font-weight: var(--weight-medium);
      color: var(--color-text-primary);
    }
    .body-xl   { font-size: var(--text-xl);   line-height: var(--leading-relaxed); color: var(--color-text-secondary); }
    .body-lg   { font-size: var(--text-lg);   line-height: var(--leading-relaxed); color: var(--color-text-secondary); }
    .body-base { font-size: var(--text-base); line-height: var(--leading-normal);  color: var(--color-text-secondary); }
    .body-sm   { font-size: var(--text-sm);   line-height: var(--leading-normal);  color: var(--color-text-muted); }
    .label {
      font-size: var(--text-xs); font-weight: var(--weight-semibold);
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-muted);
    }
    .mono          { font-family: var(--font-mono); }
    .text-accent   { color: var(--color-accent); }
    .text-primary  { color: var(--color-text-primary); }
    .text-muted    { color: var(--color-text-muted); }
    .gradient-text {
      background: linear-gradient(135deg, var(--color-text-primary) 0%, var(--color-text-secondary) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Cards ─────────────────────────────────────────────────────────── */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      box-shadow: var(--shadow-md);
      transition: all var(--transition-base);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
      opacity: 0; transition: opacity var(--transition-base);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
      border-color: rgba(255,255,255,0.1);
    }
    .card:hover::before { opacity: 1; }

    .card-sm {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      transition: all var(--transition-base);
    }
    .card-sm:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    .card-glass {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all var(--transition-base);
      box-shadow: var(--shadow-premium);
    }
    .card-glass:hover {
      background: rgba(255,255,255,0.04);
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.12);
    }

    /* ── Premium Utilities ────────────────────────────────────────────── */
    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .shimmer {
      position: relative; overflow: hidden;
    }
    .shimmer::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: translateX(-100%);
      animation: shimmer-anim 2.5s infinite;
    }
    @keyframes shimmer-anim { 100% { transform: translateX(100%); } }

    .float { animation: float-anim 6s ease-in-out infinite; }
    @keyframes float-anim {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* ── Buttons ───────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: var(--space-2); padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-md); font-size: var(--text-sm);
      font-weight: var(--weight-semibold); font-family: var(--font-sans);
      text-decoration: none; border: none; cursor: pointer;
      transition: all var(--transition-fast); white-space: nowrap; line-height: 1;
    }
    .btn-primary {
      background: var(--color-accent); color: var(--color-accent-text);
    }
    .btn-primary:hover {
      background: var(--color-accent-hover);
      transform: translateY(-1px); box-shadow: var(--shadow-md);
    }
    .btn-secondary {
      background: transparent; color: var(--color-text-primary);
      border: 1.5px solid var(--color-border);
    }
    .btn-secondary:hover {
      border-color: var(--color-accent); color: var(--color-accent);
      background: rgba(99,102,241,0.06);
    }
    .btn-ghost {
      background: transparent; color: var(--color-text-secondary);
    }
    .btn-ghost:hover { color: var(--color-text-primary); background: var(--color-surface-2); }
    .btn-lg { padding: var(--space-4) var(--space-8); font-size: var(--text-base); border-radius: var(--radius-lg); }
    .btn-sm { padding: var(--space-2) var(--space-4); font-size: var(--text-xs); }

    /* ── Badge / Tag ───────────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs); font-weight: var(--weight-semibold);
      background: rgba(99,102,241,0.12); color: var(--color-accent);
      border: 1px solid rgba(99,102,241,0.2);
    }
    .tag {
      display: inline-flex; align-items: center;
      padding: 3px var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs); font-weight: var(--weight-medium);
      background: var(--color-surface-2); color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }

    /* ── Divider ───────────────────────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--color-border); margin: var(--space-8) 0; }

    /* ── Section header helper ─────────────────────────────────────────── */
    .section-header { margin-bottom: var(--space-12); }
    .section-header.centered { text-align: center; }
    .section-header .label { margin-bottom: var(--space-3); display: block; }
    .section-header .heading-2 { margin-bottom: var(--space-4); }
    .section-header .body-lg { max-width: 600px; }
    .section-header.centered .body-lg { margin: 0 auto; }

    /* ── Navigation ────────────────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: color-mix(in srgb, var(--color-surface) 85%, transparent);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--color-border);
    }
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      max-width: 1200px; margin: 0 auto;
      padding: 0 var(--space-6); height: 64px;
    }
    .logo {
      font-size: var(--text-lg); font-weight: var(--weight-bold);
      color: var(--color-text-primary); text-decoration: none;
      letter-spacing: -0.5px; flex-shrink: 0;
    }
    .nav-links {
      display: flex; list-style: none; gap: var(--space-1);
      margin: 0; padding: 0; align-items: center;
    }
    .nav-links a {
      display: block; text-decoration: none;
      color: var(--color-text-muted); font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      transition: color var(--transition-fast), background var(--transition-fast);
    }
    .nav-links a:hover {
      color: var(--color-text-primary);
      background: var(--color-surface-2);
    }

    /* ── Footer ────────────────────────────────────────────────────────── */
    .footer {
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      padding: var(--space-12) 0;
      margin-top: auto;
    }
    .footer-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 var(--space-6);
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: var(--space-6);
    }
    .footer-links {
      display: flex; list-style: none; gap: var(--space-6);
      margin: 0; padding: 0; flex-wrap: wrap;
    }
    .footer-links a {
      text-decoration: none; color: var(--color-text-muted);
      font-size: var(--text-sm);
      transition: color var(--transition-fast);
    }
    .footer-links a:hover { color: var(--color-text-primary); }
    .copyright { font-size: var(--text-sm); color: var(--color-text-muted); }

    /* ── Main content ──────────────────────────────────────────────────── */
    .main-content { flex: 1; }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .heading-1 { font-size: var(--text-4xl); }
      .heading-2 { font-size: var(--text-3xl); }
      .container, .container-sm { padding: 0 var(--space-4); }
      .section { padding: var(--space-16) 0; }
      .section-sm { padding: var(--space-12) 0; }
      .nav-links { display: none; }
      .footer-inner { flex-direction: column; text-align: center; }
      .footer-links { justify-content: center; }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="/" class="logo">Portfolio</a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/home">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/projects">Projects</a></li>
        <li><a href="/highlights">Highlights</a></li>
        <li><a href="/contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span class="logo">Portfolio</span>
      <ul class="footer-links">
        <li><a href="/">Home</a></li>
          <li><a href="/home">Home</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/projects">Projects</a></li>
          <li><a href="/highlights">Highlights</a></li>
          <li><a href="/contact">Contact</a></li>
      </ul>
      <p class="copyright">&copy; {{ now().year }} Portfolio. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
